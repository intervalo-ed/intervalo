<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intervalo</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1E1E34">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Serif:opsz,wght@8..144,600;8..144,700;8..144,800&family=Montserrat:wght@200;350;900&family=Archivo+Black&family=Saira:wght@300;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/dreampulse/computer-modern-web-font@master/font.css">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { overscroll-behavior: none; }
      body { background: #131324; font-family: 'Inter', system-ui, -apple-system, sans-serif; color: #F1F5F9; }
      @keyframes slideInRight  { from { opacity:0; transform:translateX(60px)  } to { opacity:1; transform:translateX(0) } }
      @keyframes slideInLeft   { from { opacity:0; transform:translateX(-60px) } to { opacity:1; transform:translateX(0) } }
      @keyframes slideOutLeft  { from { opacity:1; transform:translateX(0)     } to { opacity:0; transform:translateX(-60px) } }
      @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
      @keyframes beltReveal { from { opacity:0; transform:scale(0.85) translateY(10px) } to { opacity:1; transform:scale(1) translateY(0) } }
      @keyframes beltGift { 0%{opacity:0;transform:translateY(-55px) rotate(-6deg) scale(0.75)} 55%{opacity:1;transform:translateY(6px) rotate(3deg) scale(1.06)} 75%{transform:translateY(-3px) rotate(-1deg) scale(0.98)} 100%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)} }
      @keyframes dotPop { from { transform:translate(-50%,-50%) scale(0); opacity:0 } to { transform:translate(-50%,-50%) scale(1); opacity:1 } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
